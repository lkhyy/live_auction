services:
  mysql:
    image: mysql:8.0
    container_name: live_auction_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: live_auction
      MYSQL_USER: auction
      MYSQL_PASSWORD: auction
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: live_auction_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: live_auction_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://auction:auction@mysql:3306/live_auction
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: live_auction_web
    restart: unless-stopped
    depends_on:
      - api
    profiles:
      - full

  web-admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.web-admin
    container_name: live_auction_web_admin
    restart: unless-stopped
    depends_on:
      - api
    profiles:
      - full

  nginx:
    image: nginx:alpine
    container_name: live_auction_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - web-admin
    profiles:
      - full

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: live_auction_redis_ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - dev-tools

volumes:
  mysql_data:
  redis_data:
